<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Box/Asset icon with gradient -->
  <defs>
    <linearGradient id="assetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42b883;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#33a06f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main box -->
  <rect x="15" y="25" width="70" height="50" rx="4" fill="url(#assetGradient)" stroke="#2c7a5a" stroke-width="2"/>
  <!-- Box lid -->
  <path d="M 15 25 L 50 10 L 85 25" fill="none" stroke="#2c7a5a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Checkmark -->
  <path d="M 35 45 L 42 52 L 60 35" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
