services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: AssetManagerDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - asset-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=AssetManagerDb;Username=postgres;Password=postgres"
    ports:
      - "5001:5001"
    networks:
      - asset-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - asset-net

networks:
  asset-net:
    driver: bridge

volumes:
  pgdata:
